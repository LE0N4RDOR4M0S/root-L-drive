version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: private-driver-backend-dev
    environment:
      JWT_SECRET_KEY: super-secret-change-me
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 1440
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB_NAME: private_driver
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      MINIO_BUCKET_NAME: private-drive
      MINIO_FORCE_SSE: "false"
      MINIO_SSE_STRICT: "false"
      FILE_ENCRYPTION_KEY_BASE64: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      CORS_ALLOW_ORIGINS: http://localhost:5173,http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy

  mongo:
    image: mongo:7.0
    container_name: private-driver-mongo-dev
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: private_driver
    volumes:
      - mongo_data_dev:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: private-driver-minio-dev
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data_dev:/data
    healthcheck:
      test: curl -f http://localhost:9000/minio/health/live
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data_dev:
  minio_data_dev:
