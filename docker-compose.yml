services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: private-drive-backend
    environment:
      JWT_SECRET_KEY: super-secret-change-me
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 1440
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB_NAME: private_drive
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      MINIO_BUCKET_NAME: private-drive
      MINIO_FORCE_SSE: "false"
      MINIO_SSE_STRICT: "false"
      FILE_ENCRYPTION_KEY_BASE64: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      CORS_ALLOW_ORIGINS: http://localhost:5173,http://frontend:5173
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "8000:8000"
    depends_on:
      - mongo
      - minio
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: private-drive-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    depends_on:
      - backend

  mongo:
    image: mongo:8.0
    container_name: private-drive-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    container_name: private-drive-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  redis:
    image: redis:7.2-alpine
    container_name: private-drive-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  minio_data:
  redis_data:
